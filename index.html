<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידון ידע</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-fruit {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.13; }
      90%  { opacity: 0.13; }
      100% { transform: translateY(-15vh) rotate(25deg); opacity: 0; }
    }

    .card {
      background: white;
      position: relative;
      z-index: 1;
      border-radius: 24px;
      padding: 36px;
      width: 500px;
      max-width: 95vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      text-align: center;
    }

    /* ── HOME SCREEN ── */
    #home { display: flex; flex-direction: column; align-items: center; gap: 18px; }

    .home-logo { font-size: 64px; line-height: 1; }
    .home-title { font-size: 30px; color: #222; }
    .home-subtitle { font-size: 15px; color: #888; line-height: 1.6; }

    .category-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; margin-top: 6px; }

    .cat-btn {
      width: 100%;
      padding: 16px 22px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: right;
    }
    .cat-btn:hover  { transform: scale(1.03); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
    .cat-btn:active { transform: scale(0.97); }

    .cat-icon { font-size: 44px; flex-shrink: 0; }
    .cat-text { display: flex; flex-direction: column; align-items: flex-start; }
    .cat-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .cat-sub  { font-size: 14px; font-weight: 400; opacity: 0.88; }

    .cat-btn-fruits     { background: linear-gradient(135deg, #ff9a3c, #ffd200); }
    .cat-btn-vegetables { background: linear-gradient(135deg, #43a047, #a8e063); }
    .cat-btn-vehicles   { background: linear-gradient(135deg, #1e88e5, #42e0f5); }
    .cat-btn-animals    { background: linear-gradient(135deg, #8e24aa, #f06292); }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 15px;
      color: #888;
    }

    .top-home-btn {
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .top-home-btn:hover  { background: #e3f2fd; border-color: #1e88e5; transform: scale(1.1); }
    .top-home-btn:active { transform: scale(0.93); }

    .mute-btn {
      background: #f0f0f0;
      border: 2px solid #ccc;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #555;
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .mute-btn:hover { background: #ffe0b2; border-color: #f7971e; color: #c76b00; transform: scale(1.05); }
    .mute-btn.muted { background: #fdecea; border-color: #f44336; color: #c62828; }

    .score-badge {
      background: #fff3cd;
      color: #d68000;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 15px;
    }

    h1 { font-size: 26px; color: #222; margin-bottom: 18px; }

    /* ── GAME ── */
    .fruit-wrap {
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      background: #f3f3f3;
      margin-bottom: 18px;
      border: 2px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fruit-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .emoji-fallback { font-size: 110px; display: none; }

    .question { font-size: 19px; color: #555; margin-bottom: 16px; font-weight: 600; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .opt {
      padding: 12px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      background: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .opt:hover:not(:disabled) { border-color: #f7971e; background: #fff8ee; transform: translateY(-2px); }
    .opt.correct  { background: #4caf50; border-color: #4caf50; color: white; }
    .opt.wrong    { background: #f44336; border-color: #f44336; color: white; }
    .opt:disabled { cursor: default; }

    .opt-main-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }
    .opt-speak-icon {
      font-size: 16px;
      flex-shrink: 0;
      padding: 3px 5px;
      border-radius: 6px;
      background: rgba(0,0,0,0.06);
      transition: background 0.15s, transform 0.1s;
    }
    .opt-speak-icon:active { transform: scale(0.92); background: rgba(0,0,0,0.15); }

    .opt-en-label {
      display: block;
      font-size: 12px;
      color: #999;
      font-weight: 400;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }
    .opt.correct .opt-en-label,
    .opt.wrong   .opt-en-label { color: rgba(255,255,255,0.8); }

    .feedback { display: none; }
    .english-name { display: none; }

    /* ── POPUP ── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .popup-overlay.show { display: flex; }
    .popup-box {
      background: white;
      border-radius: 24px;
      padding: 36px 48px;
      text-align: center;
      box-shadow: 0 16px 60px rgba(0,0,0,0.35);
      transform: scale(0.5);
      opacity: 0;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
      min-width: 240px;
    }
    .popup-overlay.show .popup-box { transform: scale(1); opacity: 1; }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 14px;
      top: -20px;
      border-radius: 2px;
      opacity: 0;
      z-index: 999;
      animation: confetti-fall 1.4s ease-in forwards;
      pointer-events: none;
    }
    @keyframes confetti-fall {
      0%   { opacity: 1; transform: translateY(0)     rotateZ(0deg)   scaleX(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(100vh) rotateZ(720deg) scaleX(-1); }
    }

    .popup-icon   { font-size: 56px; line-height: 1; margin-bottom: 10px; }
    .popup-result { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .popup-result.ok  { color: #4caf50; }
    .popup-result.err { color: #f44336; }
    .popup-hebrew  { font-size: 28px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .popup-english { font-size: 22px; color: #888; letter-spacing: 0.5px; }
    .popup-phonetic-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4px; }
    .popup-phonetic { font-size: 18px; color: #bbb; }
    .speak-btn {
      background: #f0f0f0;
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .speak-btn:hover  { background: #e0e0e0; transform: scale(1.1); }
    .speak-btn:active { transform: scale(0.95); }

    .timer-bar-wrap { height: 5px; background: #eee; border-radius: 4px; margin-top: 14px; overflow: hidden; display: none; }
    .timer-bar { height: 100%; background: #f7971e; width: 100%; transition: width 1.5s linear; }

    /* ── END SCREEN ── */
    #end { display: none; flex-direction: column; align-items: center; gap: 14px; }

    .big-score  { font-size: 80px; font-weight: 800; color: #f7971e; line-height: 1; }
    .result-msg { font-size: 22px; color: #444; }

    .play-again {
      padding: 13px 42px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Segoe UI', sans-serif;
    }
    .play-again:hover { background: #388e3c; }

    .home-btn {
      padding: 10px 28px;
      background: #f5f5f5;
      color: #555;
      border: 2px solid #ddd;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'Segoe UI', sans-serif;
    }
    .home-btn:hover { background: #e3f2fd; border-color: #1e88e5; color: #1e88e5; }

    .dedication { text-align: center; color: #bbb; font-size: 13px; margin-top: 10px; margin-bottom: 4px; font-style: italic; }
    .version    { text-align: center; color: #ddd; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="card">

  <!-- HOME SCREEN -->
  <div id="home">
    <div class="home-logo">🎓</div>
    <h1 class="home-title">חידון ידע</h1>
    <p class="home-subtitle">בחר קטגוריה<br>Choose a category</p>
    <div class="category-grid">
      <button class="cat-btn cat-btn-fruits" onclick="startGame('fruits')">
        <span class="cat-icon">🍎</span>
        <span class="cat-text"><span class="cat-name">פירות</span><span class="cat-sub">Fruits</span></span>
      </button>
      <button class="cat-btn cat-btn-vegetables" onclick="startGame('vegetables')">
        <span class="cat-icon">🥕</span>
        <span class="cat-text"><span class="cat-name">ירקות</span><span class="cat-sub">Vegetables</span></span>
      </button>
      <button class="cat-btn cat-btn-vehicles" onclick="startGame('vehicles')">
        <span class="cat-icon">🚗</span>
        <span class="cat-text"><span class="cat-name">כלי רכב</span><span class="cat-sub">Vehicles</span></span>
      </button>
      <button class="cat-btn cat-btn-animals" onclick="startGame('animals')">
        <span class="cat-icon">🦁</span>
        <span class="cat-text"><span class="cat-name">חיות</span><span class="cat-sub">Animals</span></span>
      </button>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game-area" style="display:none">
    <div class="top-bar">
      <button class="top-home-btn" onclick="goHome()" title="Home">🏠</button>
      <span id="q-num">שאלה 1 / 15</span>
      <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊 <span id="mute-label">צליל / Sound</span></button>
      <span class="score-badge">✅ <span id="score">0</span>/15</span>
    </div>

    <h1 id="game-title">חידון פירות</h1>

    <div id="game">
      <div class="fruit-wrap">
        <img id="fruit-img" src="" alt="" onerror="this.style.display='none'; document.getElementById('emoji-fb').style.display='flex'">
        <div class="emoji-fallback" id="emoji-fb"></div>
      </div>
      <p class="question" id="question-text">איזה פרי זה?</p>
      <div class="options" id="options"></div>
      <p class="dedication">מוקדש לבעלי האהוב ❤️</p>
      <p class="feedback" id="feedback"></p>
      <div class="timer-bar-wrap" id="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    </div>
  </div>

  <!-- POPUP -->
  <div class="popup-overlay" id="popup" onclick="clearTimeout(popupTimer); closePopup();">
    <div class="popup-box">
      <div class="popup-icon" id="popup-icon"></div>
      <div class="popup-result" id="popup-result"></div>
      <div class="popup-hebrew" id="popup-hebrew"></div>
      <div class="popup-english" id="popup-english"></div>
      <div class="popup-phonetic-row">
        <div class="popup-phonetic" id="popup-phonetic"></div>
        <button class="speak-btn" onclick="speakWord()">🔊</button>
      </div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="end">
    <p class="result-msg" id="result-msg"></p>
    <div class="big-score" id="final-score"></div>
    <p style="color:#999; font-size:15px">מתוך 15</p>
    <button class="play-again" onclick="restart()">שחק שוב / Play Again</button>
    <button class="home-btn" onclick="goHome()">🏠 בחר קטגוריה / Choose Category</button>
  </div>

  <p class="version">v2.3</p>
</div>

    { name: "ואן",            en: "Van",          ph: "וואן",         emoji: "🚐",  img: "images/vehicles/van.jpg" },

    { name: "מטוס",           en: "Airplane",     ph: "אירפליין",     emoji: "✈️",  img: "images/vehicles/airplane.jpg" },
    { name: "מסוק",           en: "Helicopter",   ph: "הליקופטר",     emoji: "🚁",  img: "images/vehicles/helicopter.jpg" },
    { name: "ספינה",          en: "Ship",         ph: "שיפ",          emoji: "🚢",  img: "images/vehicles/ship.jpg" },
    { name: "קטנוע",          en: "Scooter",      ph: "סקוטר",        emoji: "🛵",  img: "images/vehicles/scooter.jpg" },
    { name: "אופניים",        en: "Bicycle",      ph: "בייסיקל",      emoji: "🚲",  img: "images/vehicles/bicycle.jpg" },
    { name: "טרקטור",         en: "Tractor",      ph: "טרקטור",       emoji: "🚜",  img: "images/vehicles/tractor.jpg" },
    { name: "טנדר",           en: "Pickup Truck", ph: "פיקאפ טראק",   emoji: "🛻",  img: "images/vehicles/pickup.jpg" },
    { name: "רכבת תחתית",     en: "Subway",       ph: "סאבוויי",      emoji: "🚇",  img: "images/vehicles/subway.jpg" },
  ];

  const animals = [
    { name: "כלב",      en: "Dog",       ph: "דוג",      emoji: "🐕",  img: "images/animals/dog.jpg" },
    { name: "חתול",     en: "Cat",       ph: "קאט",      emoji: "🐈",  img: "images/animals/cat.jpg" },
    { name: "אריה",     en: "Lion",      ph: "לייאן",    emoji: "🦁",  img: "images/animals/lion.jpg" },
    { name: "פיל",      en: "Elephant",  ph: "אלפנט",    emoji: "🐘",  img: "images/animals/elephant.jpg" },
    { name: "ג'ירפה",   en: "Giraffe",   ph: "ג'ירף",    emoji: "🦒",  img: "images/animals/giraffe.jpg" },
    { name: "זברה",     en: "Zebra",     ph: "זיברה",    emoji: "🦓",  img: "images/animals/zebra.jpg" },
    { name: "טיגריס",   en: "Tiger",     ph: "טייגר",    emoji: "🐯",  img: "images/animals/tiger.jpg" },
    { name: "דוב",      en: "Bear",      ph: "בר",       emoji: "🐻",  img: "images/animals/bear.jpg" },
    { name: "קוף",      en: "Monkey",    ph: "מנקי",     emoji: "🐒",  img: "images/animals/monkey.jpg" },
    { name: "סוס",      en: "Horse",     ph: "הורס",     emoji: "🐴",  img: "images/animals/horse.jpg" },
    { name: "פרה",      en: "Cow",       ph: "קאו",      emoji: "🐄",  img: "images/animals/cow.jpg" },
    { name: "חזיר",     en: "Pig",       ph: "פיג",      emoji: "🐷",  img: "images/animals/pig.jpg" },
    { name: "תרנגולת",  en: "Chicken",   ph: "צ'יקן",    emoji: "🐔",  img: "images/animals/chicken.jpg" },
    { name: "כבשה",     en: "Sheep",     ph: "שיפ",      emoji: "🐑",  img: "images/animals/sheep.jpg" },
    { name: "ארנב",     en: "Rabbit",    ph: "ראביט",    emoji: "🐇",  img: "images/animals/rabbit.jpg" },
    { name: "ברווז",    en: "Duck",      ph: "דק",       emoji: "🦆",  img: "images/animals/duck.jpg" },
    { name: "ינשוף",    en: "Owl",       ph: "אאול",     emoji: "🦉",  img: "images/animals/owl.jpg" },
    { name: "פינגווין", en: "Penguin",   ph: "פנגווין",  emoji: "🐧",  img: "images/animals/penguin.jpg" },
    { name: "דולפין",   en: "Dolphin",   ph: "דולפין",   emoji: "🐬",  img: "images/animals/dolphin.jpg" },
    { name: "צפרדע",    en: "Frog",      ph: "פרוג",     emoji: "🐸",  img: "images/animals/frog.jpg" },
  ];

  const categoryConfig = {
    fruits:     { data: fruits,     title: 'חידון פירות',   question: 'איזה פרי זה?',    bgEmojis: ['🍎','🍌','🍊','🍓','🍇','🍍','🥝','🍑','🍋','🍒','🥭','🍐','🫐','🍉','🥑'] },
    vegetables: { data: vegetables, title: 'חידון ירקות',   question: 'איזה ירק זה?',    bgEmojis: ['🥕','🥒','🍅','🥔','🧅','🧄','🫑','🍆','🥦','🌽','🥬','🍠','🫛','🌿','🌱'] },
    vehicles:   { data: vehicles,   title: 'חידון כלי רכב', question: 'מה כלי הרכב?',    bgEmojis: ['🚗','🚌','🚚','🚑','🚒','🏍️','🚕','🚓','🚙','🏎️','🚐','🚂','✈️','🚁','🚢'] },
    animals:    { data: animals,    title: 'חידון חיות',    question: 'איזו חיה זו?',    bgEmojis: ['🦁','🐘','🦒','🐯','🐻','🦓','🐒','🐴','🐄','🐷','🐔','🐑','🐇','🦆','🦉'] },
  };

  // ── STATE ─────────────────────────────────────────────────────────
  const TOTAL = 15;
  const DELAY = 8000;
  let questions = [], idx = 0, score = 0;
  let currentData = fruits;
  let isMuted = false;
  let currentWord = '', currentHebWord = '';
  let popupTimer = null;
  let bgElements = [];

  // ── AUDIO ─────────────────────────────────────────────────────────
  const cheerAudio = new Audio('cheer.mp3');
  cheerAudio.preload = 'auto';

  function playCheer() {
    try { cheerAudio.currentTime = 0; cheerAudio.volume = 1; cheerAudio.play(); } catch(e) {}
  }

  function fadeOutCheer(onDone) {
    let vol = cheerAudio.volume;
    const iv = setInterval(() => {
      vol = Math.max(0, vol - 0.07);
      cheerAudio.volume = vol;
      if (vol <= 0) { clearInterval(iv); cheerAudio.pause(); cheerAudio.currentTime = 0; cheerAudio.volume = 1; if (onDone) onDone(); }
    }, 40);
  }

  // ── SPEECH ────────────────────────────────────────────────────────
  const femaleNames = ['Samantha','Jenny','Aria','Michelle','Monica','Karen','Moira','Tessa','Victoria','Zira','Susan','Eva','Allison','Ava'];

  function getVoice() {
    const voices = window.speechSynthesis.getVoices();
    const us = voices.filter(v => v.lang === 'en-US');
    return us.find(v => femaleNames.some(n => v.name.includes(n))) || us[0] || voices[0];
  }

  function getHebrewFemaleVoice() {
    const voices = window.speechSynthesis.getVoices();
    const heVoices = voices.filter(v => v.lang.startsWith('he'));
    const femaleHe = ['Carmit','Hadas','Tamar','Yael','Miriam','Tali','Hila','Ronit'];
    return heVoices.find(v => femaleHe.some(n => v.name.includes(n)))
        || heVoices.find(v => !['Asaf','Avri','Yoav','Moshe'].some(n => v.name.includes(n)))
        || heVoices[0] || null;
  }

  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();

  function doSpeak(text, voice, lang, rate, onEnd) {
    window.speechSynthesis.cancel();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const utt = new SpeechSynthesisUtterance(text);
      utt.voice = voice; utt.lang = lang; utt.rate = rate; utt.pitch = 1.05; utt.volume = 1;
      if (onEnd) utt.onend = onEnd;
      window.speechSynthesis.speak(utt);
    }));
  }

  function speakSequence(hebrewWord, englishWord) {
    fadeOutCheer(() => {
      doSpeak(hebrewWord, getHebrewFemaleVoice(), 'he-IL', 0.78, null);
      setTimeout(() => doSpeak(englishWord, getVoice(), 'en-US', 0.75, null), 900 + hebrewWord.length * 320);
    });
  }

  function speakWord() {
    if (!currentWord || isMuted) return;
    doSpeak(currentWord, getVoice(), 'en-US', 0.75, null);
    clearTimeout(popupTimer);
    popupTimer = setTimeout(closePopup, 5000);
  }

  function speakHebrew(word) {
    window.speechSynthesis.cancel();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const utt = new SpeechSynthesisUtterance(word);
      utt.voice = getHebrewFemaleVoice(); utt.lang = 'he-IL'; utt.rate = 0.78; utt.pitch = 1.1; utt.volume = 1;
      window.speechSynthesis.speak(utt);
    }));
  }

  setInterval(() => {
    if (!window.speechSynthesis.speaking) { window.speechSynthesis.pause(); window.speechSynthesis.resume(); }
  }, 8000);

  // ── MUTE ──────────────────────────────────────────────────────────
  function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('mute-btn');
    btn.classList.toggle('muted', isMuted);
    document.getElementById('mute-label').textContent = isMuted ? 'שקט / Silence' : 'צליל / Sound';
    btn.childNodes[0].textContent = isMuted ? '🔇 ' : '🔊 ';
    if (isMuted) { window.speechSynthesis.cancel(); cheerAudio.pause(); cheerAudio.currentTime = 0; cheerAudio.volume = 1; }
  }

  // ── CONFETTI ──────────────────────────────────────────────────────
  function launchConfetti() {
    const colors = ['#f7971e','#ffd200','#4caf50','#2196f3','#e91e63','#9c27b0','#ff5722','#00bcd4'];
    for (let i = 0; i < 90; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (8 + Math.random() * 8) + 'px';
      el.style.height = (12 + Math.random() * 10) + 'px';
      el.style.animationDelay = (Math.random() * 0.6) + 's';
      el.style.animationDuration = (1.1 + Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ── BACKGROUND FLOATERS ───────────────────────────────────────────
  function spawnBgEmojis(emojis) {
    bgElements.forEach(el => el.remove());
    bgElements = [];
    emojis.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'bg-fruit';
      el.textContent = emoji;
      el.style.left = (5 + (i / emojis.length) * 90) + 'vw';
      el.style.fontSize = (28 + Math.random() * 22) + 'px';
      const dur = 12 + Math.random() * 10;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = -(Math.random() * dur) + 's';
      document.body.appendChild(el);
      bgElements.push(el);
    });
  }

  // ── NAVIGATION ────────────────────────────────────────────────────
  function goHome() {
    window.speechSynthesis.cancel();
    cheerAudio.pause(); cheerAudio.currentTime = 0; cheerAudio.volume = 1;
    score = 0; idx = 0;
    document.getElementById('end').style.display = 'none';
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('home').style.display = 'flex';
    spawnBgEmojis(['🍎','🥕','🚗','🍌','🥦','🚌','🍊','🍅','✈️','🍇','🧄','🚂','🍋','🥒','🏍️']);
  }

  function startGame(category) {
    const cfg = categoryConfig[category];
    currentData = cfg.data;
    document.getElementById('home').style.display = 'none';
    document.getElementById('end').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('game').style.display = 'block';
    document.getElementById('game-title').textContent = cfg.title;
    document.getElementById('question-text').textContent = cfg.question;
    document.getElementById('score').textContent = 0;
    score = 0; idx = 0;
    spawnBgEmojis(cfg.bgEmojis);
    buildQuestions();
    renderQuestion();
  }

  function restart() {
    score = 0; idx = 0;
    document.getElementById('score').textContent = 0;
    document.getElementById('game').style.display = 'block';
    document.getElementById('end').style.display = 'none';
    buildQuestions();
    renderQuestion();
  }

  // ── GAME LOGIC ────────────────────────────────────────────────────
  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

  function buildQuestions() {
    questions = shuffle(currentData).slice(0, TOTAL).map(correct => {
      const distractors = shuffle(currentData.filter(f => f.name !== correct.name)).slice(0, 3);
      return { correct, options: shuffle([correct, ...distractors]) };
    });
  }

  function renderQuestion() {
    const q = questions[idx];
    const img = document.getElementById('fruit-img');
    const emojiEl = document.getElementById('emoji-fb');

    if (q.correct.img) {
      img.style.display = 'block';
      emojiEl.style.display = 'none';
      img.src = q.correct.img;
    } else {
      img.style.display = 'none';
      emojiEl.style.display = 'flex';
    }
    emojiEl.textContent = q.correct.emoji;

    document.getElementById('q-num').textContent = `שאלה ${idx + 1} / ${TOTAL}`;
    document.getElementById('feedback').textContent = '';
    document.getElementById('timer-wrap').style.display = 'none';

    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.dataset.name = opt.name;
      btn.innerHTML = `<span class="opt-main-row"><span>${opt.name}</span><span class="opt-speak-icon">🔊</span></span><span class="opt-en-label">${opt.en}</span>`;
      btn.querySelector('.opt-speak-icon').addEventListener('click', e => {
        e.stopPropagation();
        if (!isMuted) speakHebrew(opt.name);
      });
      btn.onclick = () => pick(btn, opt.name, q.correct.name, q.correct.en, q.correct.ph);
      optDiv.appendChild(btn);
    });
  }

  function pick(btn, chosen, correct, correctEn, correctPh) {
    document.querySelectorAll('.opt').forEach(b => b.disabled = true);
    const isCorrect = chosen === correct;

    if (isCorrect) {
      btn.classList.add('correct');
      score++;
      document.getElementById('score').textContent = score;
      launchConfetti();
      if (!isMuted) playCheer();
    } else {
      btn.classList.add('wrong');
      document.querySelectorAll('.opt').forEach(b => {
        if (b.dataset.name === correct) b.classList.add('correct');
      });
    }

    document.getElementById('popup-icon').textContent    = isCorrect ? '✅' : '❌';
    document.getElementById('popup-result').textContent  = isCorrect ? 'נכון!' : 'לא נכון';
    document.getElementById('popup-result').className    = 'popup-result ' + (isCorrect ? 'ok' : 'err');
    document.getElementById('popup-hebrew').textContent  = correct;
    document.getElementById('popup-english').textContent = correctEn;
    document.getElementById('popup-phonetic').textContent = correctPh;
    currentWord = correctEn;
    currentHebWord = correct;

    document.getElementById('popup').classList.add('show');

    if (isCorrect) {
      if (!isMuted) setTimeout(() => speakSequence(correct, correctEn), 600);
    } else {
      if (!isMuted) setTimeout(() => {
        doSpeak(correct, getHebrewFemaleVoice(), 'he-IL', 0.78, null);
        setTimeout(() => doSpeak(correctEn, getVoice(), 'en-US', 0.75, null), 900 + correct.length * 320);
      }, 500);
    }

    clearTimeout(popupTimer);
    popupTimer = setTimeout(closePopup, DELAY);
  }

  function closePopup() {
    window.speechSynthesis.cancel();
    document.getElementById('popup').classList.remove('show');
    setTimeout(nextQ, 200);
  }

  function nextQ() {
    idx++;
    if (idx >= TOTAL) showEnd();
    else renderQuestion();
  }

  function showEnd() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('end').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
    let msg;
    if (score === TOTAL)  msg = '🎉 ציון מושלם!';
    else if (score >= 8)  msg = '🌟 כל הכבוד!';
    else if (score >= 5)  msg = '🙂 לא רע!';
    else                  msg = '🍎 כדאי להתאמן!';
    document.getElementById('result-msg').textContent = msg;
  }

  // Any key while popup is open skips to next question
  document.addEventListener('keydown', () => {
    if (document.getElementById('popup').classList.contains('show')) {
      clearTimeout(popupTimer);
      closePopup();
    }
  });

  // ── INIT ──────────────────────────────────────────────────────────
  spawnBgEmojis(['🍎','🥕','🚗','🍌','🥦','🚌','🍊','🍅','✈️','🍇','🧄','🚂','🍋','🥒','🏍️']);
</script>
